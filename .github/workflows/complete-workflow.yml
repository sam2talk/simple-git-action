name: Build code, run unit test, run SAST, SCA, DAST security scans

on: push

jobs:

  build:
    runs-on: ubuntu-latest
    name: Run unit tests and SAST scan on the source code
    steps:
      - uses: actions/checkout@v4
      - name: SAST (placeholder)
        run: echo "No Java project yet - skipping Maven + Sonar"

  security:
    runs-on: ubuntu-latest
    name: Run the SCA scan on the source code
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master   # ✅ fixed
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  zap_scan:
    runs-on: ubuntu-latest
    name: Run DAST scan on the web application
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'https://pentest-ground.com/'
          cmd_options: '-a'   # removed rules file
